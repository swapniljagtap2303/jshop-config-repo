server:
  port: 9095

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/ms_auth_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:mysecurekeymysecurekeymysecurekey123456}
  expiration: 3600000

sendgrid:
  api:
    key: ${SENDGRID_API_KEY}
